<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusiShop</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #d9dbdb;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 19px;
            max-width: 800px;
            margin: 0 auto;
            padding: 3%;
        }

        .box {
            background-color: aliceblue;
        }

        .header_img {
            max-width: 100%;
        }

        .call {
            text-align: center;
            font-weight: bold;
            color: purple;
            margin: .8em 0 .4em;
        }

        .desc {
            text-align: center;
            padding: 0 .6em;
        }



        .link {
            text-align: center;
            margin: 2em 0 5em;
        }

        .link_acess {
            text-decoration: none;
            color: white;
            background-color: blueviolet;
            padding: 7px;
            border-radius: 10px;
        }

        .wrapper {
            background-color: rgb(247, 247, 84);
        }

        .media_box {

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .media_box a{
            padding: .5em 0;
        }

        .icon {
            max-width: 75px;
            max-height: 75px;
        }

        .media_t{
            text-align: center;
            color: blueviolet;
            padding: 2em 0 3.5em;
        }

        .site_link {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: purple;
            padding: 1em;
        }
    </style>
</head>

<body>

    <div class="box">

        <img class="header_img" src="https://cdn.pixabay.com/photo/2017/11/02/20/31/guitars-2912447_960_720.jpg" alt="">

        <h2 class="call">Lorem, ipsum dolor.</h2>
        <p class="desc">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Suscipit quidem debitis eos,
            obcaecati, minus laudantium aspernatur officia incidunt ex, reprehenderit temporibus. Ipsam est excepturi
            pariatur?</p>
        <div class="link">
            <a class="link_acess" href="https://www.google.com/" target="blank">Saiba Mais</a>
        </div>


        <div class="wrapper">
            <h2 class="media_t" >Siga nossas páginas</h2>

            <div class="media_box">
                <a href="https://www.google.com/" target="blank"><img class="icon"
                        src="https://cdn.pixabay.com/photo/2017/06/22/06/22/facebook-2429746_960_720.png" alt=""></a>
                <a href="https://www.google.com/" target="blank"><img class="icon"
                        src="https://cdn.pixabay.com/photo/2016/09/17/07/03/instagram-1675670_960_720.png" alt=""></a>
                <a href="https://www.google.com/" target="blank"><img class="icon"
                        src="https://cdn.pixabay.com/photo/2017/06/23/02/35/youtube-2433301_960_720.png" alt=""></a>
            </div>
            <a class="site_link" href="https://www.google.com/" target="blank">Musishop</a>
        </div>

      
    </div>
  
</body>

</html>
